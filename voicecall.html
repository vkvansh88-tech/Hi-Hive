<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Hive | Voice Call</title>
    <link rel="stylesheet" href="voicecall.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-blob"></div>

    <div class="call-container">
        <div class="call-info">
            <div class="avatar-wrapper">
                <img id="avatar" src="" class="avatar">
            </div>
            <h2 id="username" class="brand-text">Connecting...</h2>
            <p id="callStatus" class="call-status">Voice Call • 00:00</p>
        </div>

        <div class="controls-bar">
            <button class="control-btn" id="micBtn" onclick="toggleMic()">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="control-btn" onclick="toggleSpeaker()">
                <i class="fas fa-volume-up"></i>
            </button>
            <button class="control-btn end-call" onclick="endCall()">
                <i class="fas fa-phone-slash"></i>
            </button>
        </div>
    </div>

    <script src="voicecall.js"></script>
</body>
</html>
