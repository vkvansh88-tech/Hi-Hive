<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Hive | Calls</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="calls.css">
</head>
<body>
    <div class="bg-blob"></div>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <img src="Logo.png" alt="Hi-Hive">
            </div>
            <div class="menu">
                <a href="chat.html" class="menu-item">
                    <span class="menu-icon"><i class="fa-solid fa-comment-dots"></i></span>
                    <span class="menu-text">Chats</span>
                </a>
                <a href="#" class="menu-item active">
                    <span class="menu-icon"><i class="fa-solid fa-phone"></i></span>
                    <span class="menu-text">Calls</span>
                </a>
                <a href="groups.html" class="menu-item">
                    <span class="menu-icon"><i class="fa-solid fa-people-group"></i></span>
                    <span class="menu-text">Groups</span>
                </a>
                <a href="work.html" class="menu-item">
                    <span class="menu-icon"><i class="fa-solid fa-briefcase"></i></span>
                    <span class="menu-text">Work</span>
                </a>
                <a href="friends.html" class="menu-item">
                    <span class="menu-icon"><i class="fas fa-user-friends"></i></span>
                    <span class="menu-text">Friends</span>
                </a>
            </div>
            <div class="bottom-menu">
                <a href="settings.html" class="menu-item">
                    <span class="menu-icon"><i class="fa-solid fa-gear"></i></span>
                    <span class="menu-text">Settings</span>
                </a>
            </div>
        </nav>

        <aside class="contacts">
            <div class="contacts-header">
                <h2>Recent Calls</h2>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="callSearch" placeholder="Search" onkeyup="filterCalls()">
                </div>
            </div>
            <div class="contact-list" id="callList">
                </div>
        </aside>

        <main class="chat">
            <header class="chat-header">
                <div class="chat-user">
                    <h3 class="brand-text">Call History</h3>
                </div>
            </header>
            <div class="messages empty-state">
                <div class="empty-call-icon">
                    <i class="fa-solid fa-phone-volume"></i>
                </div>
                <p>Select a contact to start a premium call.</p>
            </div>
        </main>
    </div>

    <script src="calls.js"></script>
</body>
</html>
