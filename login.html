<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hi-Hive</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="reset.css"
</head>

<body>

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <nav class="navbar">
    <div class="nav-container">
        <div class="brand-wrapper">
            <div class="logo-icon">
                <img src="Logo.png" alt="Hi-Hive Logo" class="nav-logo-img">
            </div>
            <div class="brand-text">
                <span class="logo-text">Hi-Hive</span>
                <span class="tagline">Connect • Chat • Buzz</span>
            </div>
        </div>

        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="support.html">Support</a></li>
            <li><a href="sign_up.html" class="nav-cta">Sign Up</a></li>
        </ul>
    </div>
</nav>

    <main class="login-wrapper">
        <div class="glass-card">
            <h2>Login to Hi-Hive</h2>

            <form id="loginForm">
                <div class="input-field">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="username" placeholder="Username or Email" required>
                </div>

                <div class="input-field">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" id="togglePassword" class="eye-btn">
                        <i class="fas fa-eye-slash" id="eyeIcon"></i>
                    </button>
                </div>

                <div class="form-actions">
                    <a href="reset.html" class="forgot-link">Forgot Password?</a>
                    <button type="submit" class="login-btn">Log In</button>
                </div>
            </form>

            <p class="card-footer">
                Don't have an account? <a href="sign_up.html">Create one</a>
            </p>
        </div>
    </main>
    <div id="forgotModal" class="modal-overlay">
    <div class="modal-card">
        <button id="closeModal" class="modal-close">&times;</button>
        
        <div id="resetContent">
            <h2>Reset Your Password</h2>
            <p>Enter your email to receive a reset link</p>
            
            <form id="forgotForm">
                <div class="input-field">
                    <i class="fas fa-envelope icon"></i>
                    <input type="email" id="resetEmail" placeholder="apiarist@hive.com" required>
                </div>
                <button type="submit" class="reset-submit-btn">Send Reset Link</button>
            </form>
        </div>

        <div id="successContent" style="display: none;">
            <div class="success-icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h2>Reset link sent!</h2>
            <p>Check your inbox for instructions to get back to the Hi-Hive.</p>
            <button class="reset-submit-btn" onclick="closeForgotModal()">Done</button>
        </div>
    </div>
</div>

    <script src="login.js"></script>
    <script src="reset.js"></script>
</body>

</html>
